version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ctf_backend
    restart: unless-stopped
    networks:
      - ctf_net

  frontend:
    build: ./frontend
    container_name: ctf_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ctf_net

networks:
  ctf_net:
    driver: bridge
