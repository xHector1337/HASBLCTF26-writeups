<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>403 Forbidden</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #00ff41;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      padding: 2rem;
    }

    .skull {
      font-size: 4rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 1.2rem;
      color: #ff3333;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .divider {
      width: 300px;
      border: none;
      border-top: 1px solid #1a1a1a;
    }

    .note {
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .token-box {
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-left: 3px solid #00ff41;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      word-break: break-all;
      max-width: 420px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      position: relative;
    }

    .token-box:hover {
      border-left-color: #ffff00;
      color: #ffff00;
    }

    .token-box::after {
      content: 'click to copy';
      position: absolute;
      bottom: -1.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.1em;
    }

    .hint {
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 0.15em;
      margin-top: 1rem;
    }

    .copied-msg {
      font-size: 0.7rem;
      color: #00ff41;
      opacity: 0;
      transition: opacity 0.3s;
      letter-spacing: 0.1em;
    }

    .copied-msg.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="skull">☠</div>
  <h1>access restricted</h1>
  <hr class="divider">

  <p class="note">// you shouldn't be here. but since you are...</p>

  <div class="token-box" id="token" onclick="copyToken()">
    c3VwZXJfc2VjcmV0X2FkbWluXzIwMjY=
  </div>

  <p class="copied-msg" id="copied">copied to clipboard</p>

  <script>
    function copyToken() {
      navigator.clipboard.writeText('c3VwZXJfc2VjcmV0X2FkbWluXzIwMjY=');
      const msg = document.getElementById('copied');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
    }
  </script>

</body>
</html>
